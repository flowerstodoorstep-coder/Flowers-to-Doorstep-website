<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowers to Doorstep | Gowlidoddi</title>
    <!-- Firebase Core App and Realtime Database SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <!-- Tailwind CSS Platform CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-950 text-white font-sans min-h-screen relative overflow-x-hidden">

    <!-- Immersive Background Image -->
    <div id="bg-image" class="fixed inset-0 bg-cover bg-center transition-all duration-700 ease-in-out z-0 scale-100 opacity-100"></div>
    <div class="fixed inset-0 bg-gradient-to-b from-black/60 via-black/40 to-black/90 z-0 pointer-events-none"></div>

    <div class="relative z-10 max-w-4xl mx-auto px-4 py-6">
        
        <!-- Header Section -->
        <header class="text-center my-12" id="main-header">
            <h1 class="text-4xl md:text-6xl font-black tracking-wide text-amber-400 drop-shadow-lg">FLOWERS TO DOORSTEP</h1>
            <p class="text-gray-300 mt-2 text-sm md:text-base tracking-wider font-light">Fresh Divine Blooms • Exclusively Serving Gowlidoddi</p>
            <button onclick="toggleView()" id="view-toggle-btn" class="mt-4 bg-white/10 hover:bg-white/20 text-xs px-4 py-2 rounded-full border border-white/20 transition tracking-widest uppercase font-bold">Switch to Owner Panel</button>
        </header>

        <!-- Customer Shopping View -->
        <div id="customer-view" class="block">
            <nav class="sticky top-4 bg-white/10 backdrop-blur-md rounded-full p-1.5 flex justify-between border border-white/20 shadow-2xl mb-8">
                <button onclick="selectCategory('garlands')" id="btn-garlands" class="flex-1 py-3 text-center rounded-full font-bold text-xs md:text-sm tracking-widest uppercase transition-all duration-300 text-white hover:bg-white/5">Garlands</button>
                <button onclick="selectCategory('loose flowers')" id="btn-loose" class="flex-1 py-3 text-center rounded-full font-bold text-xs md:text-sm tracking-widest uppercase transition-all duration-300 text-white hover:bg-white/5">Loose Flowers</button>
                <button onclick="selectCategory('others')" id="btn-others" class="flex-1 py-3 text-center rounded-full font-bold text-xs md:text-sm tracking-widest uppercase transition-all duration-300 text-white hover:bg-white/5">Others</button>
            </nav>
            <main id="products-container" class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-36"></main>
        </div>

        <!-- Secure Owner Management Panel -->
        <div id="owner-view" class="hidden bg-slate-900/90 backdrop-blur-md border border-white/10 p-6 rounded-2xl shadow-2xl">
            <!-- Password Guard Screen -->
            <div id="owner-auth" class="block max-w-sm mx-auto text-center py-8 space-y-4">
                <h2 class="text-2xl font-black text-amber-400 tracking-wide">OWNER ACCESS VERIFICATION</h2>
                <input type="password" id="owner-password" placeholder="Enter Security Passkey" class="w-full bg-slate-950 border border-white/20 rounded-xl p-3 text-center font-mono tracking-widest text-sm text-amber-400 focus:outline-none focus:border-amber-400">
                <button onclick="verifyOwnerPassword()" class="w-full bg-amber-400 hover:bg-amber-500 text-slate-950 py-3 rounded-xl font-bold uppercase tracking-wider text-xs transition">Verify Password</button>
            </div>

            <!-- Dashboard Content -->
            <div id="owner-dashboard" class="hidden space-y-8">
                <!-- Stock Controls -->
                <div>
                    <h2 class="text-xl font-black text-amber-400 mb-4 pb-2 border-b border-white/10">LIVE DAILY STOCK MANAGER</h2>
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-white/5 border-b border-white/10 text-xs font-bold text-amber-400">
                                <th class="p-3">Product Name</th>
                                <th class="p-3">Set Inventory Units</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body" class="divide-y divide-white/5 text-sm"></tbody>
                    </table>
                </div>

                <!-- Real-Time Order History Tracker -->
                <div>
                    <h2 class="text-xl font-black text-emerald-400 mb-4 pb-2 border-b border-white/10">REAL-TIME ORDERS & HISTORY</h2>
                    <div id="orders-history-container" class="space-y-4 max-h-96 overflow-y-auto pr-2">
                        <p class="text-gray-400 text-sm italic">No orders received yet.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Checkout Drawer -->
        <div id="cart-drawer" class="fixed bottom-0 inset-x-0 bg-slate-950 border-t border-white/20 shadow-[0_-10px_30px_rgba(0,0,0,0.5)] z-50 rounded-t-3xl max-w-4xl mx-auto p-6 hidden">
            <div id="cart-items" class="max-h-36 overflow-y-auto mb-4 space-y-2 pr-2"></div>
            <div id="promo-banner" class="mb-4 text-center text-xs font-semibold p-3 rounded-xl tracking-wide"></div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-xs uppercase tracking-widest text-gray-400 mb-1 font-bold">Delivery Location Area</label>
                    <select id="delivery-area" onchange="validateAreaSelection()" class="w-full bg-slate-900 border border-white/20 rounded-xl p-3 text-sm focus:outline-none focus:border-amber-400 text-white">
                        <option value="gowlidoddi">Gowlidoddi Zone</option>
                        <option value="outside">Outside Gowlidoddi</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-widest text-gray-400 mb-1 font-bold">Where in Gowlidoddi?</label>
                    <input type="text" id="delivery-address" placeholder="Enter house number, apartment, or street block" class="w-full bg-slate-900 border border-white/20 rounded-xl p-3 text-sm focus:outline-none focus:border-amber-400 text-white">
                </div>
            </div>
            <div class="flex flex-col sm:flex-row items-center justify-between gap-4 pt-2 border-t border-white/10">
                <div class="text-center sm:text-left">
                    <p id="pricing-summary" class="text-xs text-gray-400"></p>
                    <p class="text-2xl font-black text-white">Total: <span id="cart-total" class="text-amber-400">₹0</span></p>
                </div>
                <button onclick="submitOrder()" id="checkout-btn" class="w-full sm:w-auto bg-amber-400 hover:bg-amber-500 text-slate-950 px-8 py-4 rounded-xl font-black tracking-widest uppercase text-sm transition shadow-lg"></button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
